agents:
  - _ulid: 01KK67V5J4GDR3RQDV6SVDZ1MK
    description: Autonomous task worker. Picks up automation-eligible ready and needs_work tasks.
    auto_approve: true
    capabilities:
      - code
      - test
      - refactor
    concurrency:
      max_concurrent: 3
    conventions: []
    dispatch:
      - filter:
          automation: eligible
        on: task.in_progress
      - filter:
          automation: eligible
        on: task.ready
      - filter:
          automation: eligible
        on: task.needs_work
    id: task-worker
    name: Task Worker
    skills:
      - task-work
    tools:
      - kspec
      - git
      - npm
  - _ulid: 01KK67V5J78CCR2JNH6QW8W6KA
    description: Automated PR reviewer. Reviews pending_review tasks and merges when quality gates pass.
    auto_approve: false
    capabilities:
      - review
    concurrency:
      max_concurrent: 3
    conventions: []
    dispatch:
      - on: task.pending_review
    id: pr-reviewer
    name: PR Reviewer
    skills:
      - pr-review
    tools:
      - kspec
      - git
      - gh
  - _ulid: 01KQY8QZ49P861SBBJREEY4DPE
    description: General-purpose development agent for code, testing, refactoring, and code review tasks.
    tags:
      - scaffold-default
    auto_approve: true
    capabilities:
      - code
      - test
      - refactor
      - review
    concurrency:
      max_concurrent: 1
    conventions: []
    dispatch: []
    id: primary-dev
    name: Primary Development Agent
    skills:
      - task-work
    tools:
      - kspec
      - git
      - npm
  - _ulid: 01KQY8QZ4EQF0HDVNXA8NK7Y3K
    description: |-
      Reviews plans for quality, completeness, and spec alignment.
      Has review capability and plan-focused skills attached.

      Adapter guidance: This agent uses the default adapter configured
      for your project. If authentication fails with the default adapter,
      you can switch adapters using:
        kspec meta set agents --update plan-reviewer --adapter <adapter-name>
      Run `kspec agent adapters` to list available adapters and their
      authentication requirements.
    tags:
      - scaffold-default
    auto_approve: true
    capabilities:
      - review
    concurrency:
      max_concurrent: 1
    conventions: []
    dispatch: []
    id: plan-reviewer
    name: Plan Reviewer
    skills:
      - review-plan
      - writing-specs
      - plan
    tools:
      - kspec
      - git
conventions:
  - _ulid: 01KQY8QZ4MCSJXRFKPZVHMZC37
    domain: commits
    examples: []
    rules:
      - Use conventional commit format (feat, fix, docs, refactor, test, chore)
      - "Reference task in commit body when applicable (Task: @task-slug)"
  - _ulid: 01KQY8QZ4TMTKGA12K6X0N88VS
    domain: architecture
    examples: []
    rules:
      - "PLACEHOLDER: Replace this rule with your project's architectural constraints and patterns"
  - _ulid: 01KQY8QZ4ZKHF5TA0PG029QN2R
    domain: testing
    examples: []
    rules:
      - "PLACEHOLDER: Replace this rule with your project's testing expectations and coverage
        requirements"
hooks:
  - _ulid: 01KQY8QZ5ZJ8N4J275CJS94PHK
    action:
      type: session_prompt
      prompt: Run session reflection using /kspec:reflect
      skills:
        - reflect
    enabled: true
    name: default-session-reflect
    on: session.idle
