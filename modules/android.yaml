    requirements:
      - _ulid: 01KKEB30F1CONNECTIVITY0MON0
        slugs:
          - connectivity-monitoring
        title: Server Connectivity Monitoring
        type: requirement
        description: >
          Mobile app periodically pings server health endpoint. Connection loss shows
          visible offline banner. Banner clears automatically when connection is restored.
        acceptance_criteria:
          - Mobile app periodically pings server health endpoint
          - Connection loss shows a visible offline banner
          - Banner clears automatically when connection is restored
          - Health checks do not drain battery excessively
      - _ulid: 01KKEB30G8RECONNECTION0LOG0
        slugs:
          - reconnection-logic
        title: Automatic Reconnection
        type: requirement
        description: >
          On reconnection detection, app re-subscribes to SSE events and performs a full
          data refresh to recover state missed during offline period.
        acceptance_criteria:
          - On reconnection, app re-subscribes to SSE events
          - App performs full data refresh to recover missed state
          - No user action required to resume normal operation
