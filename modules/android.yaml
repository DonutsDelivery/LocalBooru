      - _ulid: 01KKEB30A7QR0PAIRING0CONS0
        slugs:
          - qr-pairing-consistency
        title: QR Pairing Consistency
        type: requirement
        description: >
          ServerSettings QR scan handler must call verifyHandshake() to obtain JWT token,
          matching ServerSelectScreen behavior. Re-paired server must have a valid token.
        acceptance_criteria:
          - ServerSettings QR scan calls verifyHandshake() same as ServerSelectScreen
          - Re-paired server entry has valid JWT token for authenticated requests
          - Both QR scan paths produce identical server entries
      - _ulid: 01KKEB30B3SERVER0LIST0HYG00
        slugs:
          - server-list-hygiene
        title: Server List Hygiene
        type: requirement
        description: >
          Manual Add Server deduplicates by URL. Offline servers hint about possible IP change.
        acceptance_criteria:
          - Manual Add Server checks for existing URL match and updates instead of creating duplicate
          - Offline server entries show hint suggesting IP may have changed with option to re-scan QR
