name: Build iOS

on:
  push:
    branches: [v2]
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Initialize iOS project
        run: cargo tauri ios init

      - name: Add iOS permissions
        run: |
          PLIST=$(find src-tauri/gen/apple -name "Info.plist" -not -path "*/build/*" | head -1)
          if [ -z "$PLIST" ]; then
            echo "::error::Info.plist not found after ios init"
            find src-tauri/gen/apple -type f | head -30
            exit 1
          fi
          echo "Found Info.plist at: $PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'LocalBooru uses the camera to scan QR codes for server pairing'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSLocalNetworkUsageDescription string 'LocalBooru connects to servers on your local network'" "$PLIST"

      - name: Build iOS (Simulator)
        run: cargo tauri ios build --debug --target aarch64-apple-ios-sim

      - name: Find build output
        if: always()
        run: |
          echo "Build output:"
          find src-tauri/gen/apple/build -type d -name "*.app" 2>/dev/null | head -10
          find src-tauri/gen/apple/build -type f -name "*.ipa" 2>/dev/null | head -10
          echo "All build files:"
          find src-tauri/gen/apple/build -maxdepth 4 -type f 2>/dev/null | head -30 || echo "No build directory found"

      - name: Upload iOS build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: src-tauri/gen/apple/build/
          if-no-files-found: warn
